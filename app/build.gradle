plugins { id 'com.android.application' }

android { namespace 'com.homecam'; compileSdk 36
    defaultConfig { applicationId 'com.homecam'; minSdk 26; targetSdk 36; versionCode 1; versionName '1.0.0' }
    buildTypes { release { minifyEnabled true; shrinkResources true; proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro' } debug { applicationIdSuffix '.debug'; versionNameSuffix '-debug' } }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.2.1'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.lifecycle:lifecycle-process:2.9.2'
    implementation 'androidx.localbroadcastmanager:localbroadcastmanager:1.1.0'
    implementation 'org.webrtc:google-webrtc:1.0.32006'
}
